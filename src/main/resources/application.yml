server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      server:
        webflux:
          routes:
            - id: forum-service
              uri: lb://FORUM-SERVICE
              predicates:
                - Path=/api/forum/**

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/settings/**,/api/v1/admin/security/**,/uploads/**

            - id: booking-service
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/api/v1/bookings/**,/api/v1/tickets/**

            - id: reclamation-service
              uri: lb://RECLAMATION-SERVICE
              predicates:
                - Path=/api/v1/reclamation/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/v1/payments/**,/api/v1/refunds/**,/api/v1/admin/refunds/**

            - id: fleet-service
              uri: lb://FLEET-SERVICE
              predicates:
                - Path=/api/v1/fleet/**
              filters:
                - StripPrefix=3

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/v1/notifications/**,/api/v1/notifications

            - id: block-internal
              uri: no://op
              predicates:
                - Path=/internal/**
              filters:
                - SetStatus=403

          discovery:
            locator:
              enabled: false
              lower-case-service-id: true

jwt:
  secret: ${JWT_SECRET:b7Kp9mR2xL4nW8vJ3hF6tY1sA5dG0qZwX}

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    gateway:
      access: unrestricted
  tracing:
    sampling:
      probability: 1.0